<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OptionsCLI — Performance</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg:        #13131f;
    --surface:   #1c1c2e;
    --border:    #2e2e4a;
    --green:     #00e676;
    --red:       #ff5370;
    --yellow:    #ffcb6b;
    --blue:      #82aaff;
    --muted:     #4a4a72;
    --text:      #e0e0f0;
    --dim:       #7a7a9a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }



  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--green); }

  .header-right { display: flex; align-items: center; gap: 24px; }

  .sync-time {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.05em;
  }

  .exit-btn {
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 8px 20px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.15s;
  }
  .exit-btn:hover {
    background: var(--red);
    color: var(--bg);
  }

  main { padding: 40px; max-width: 1400px; margin: 0 auto; }

  /* KPI row */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
    margin-bottom: 40px;
  }

  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }
  .kpi:nth-child(1) { animation-delay: 0.05s; }
  .kpi:nth-child(2) { animation-delay: 0.10s; }
  .kpi:nth-child(3) { animation-delay: 0.15s; }
  .kpi:nth-child(4) { animation-delay: 0.20s; }
  .kpi:nth-child(5) { animation-delay: 0.25s; }

  .kpi::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .kpi.green::before { background: var(--green); }
  .kpi.red::before   { background: var(--red); }
  .kpi.yellow::before{ background: var(--yellow); }
  .kpi.blue::before  { background: var(--blue); }
  .kpi.muted::before { background: var(--muted); }

  .kpi-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .kpi-value {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    line-height: 1;
  }
  .kpi.green .kpi-value { color: var(--green); }
  .kpi.red   .kpi-value { color: var(--red); }
  .kpi.yellow .kpi-value{ color: var(--yellow); }
  .kpi.blue  .kpi-value { color: var(--blue); }
  .kpi.muted .kpi-value { color: var(--text); }

  .kpi-sub {
    font-size: 11px;
    color: var(--dim);
    margin-top: 8px;
  }

  /* Chart grid */
  .chart-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .chart-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 28px;
    animation: fadeUp 0.5s ease both;
  }
  .card:nth-child(1) { animation-delay: 0.3s; }
  .card:nth-child(2) { animation-delay: 0.4s; }
  .card:nth-child(3) { animation-delay: 0.5s; }

  .card-title {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  canvas { width: 100% !important; }

  /* Trades table */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 28px;
    margin-bottom: 16px;
    animation: fadeUp 0.5s ease 0.6s both;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  thead th {
    text-align: left;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--dim);
    text-transform: uppercase;
    padding: 0 12px 14px;
    border-bottom: 1px solid var(--border);
  }

  tbody tr {
    border-bottom: 1px solid rgba(30,30,46,0.6);
    transition: background 0.1s;
  }
  tbody tr:hover { background: rgba(255,255,255,0.02); }

  tbody td {
    padding: 12px;
    color: var(--text);
  }

  .badge {
    display: inline-block;
    padding: 3px 8px;
    font-size: 10px;
    letter-spacing: 0.08em;
  }
  .badge-win    { background: rgba(0,255,135,0.1);  color: var(--green); }
  .badge-loss   { background: rgba(255,58,92,0.1);  color: var(--red); }
  .badge-pending{ background: rgba(76,201,240,0.1); color: var(--blue); }
  .badge-other  { background: rgba(90,90,122,0.15); color: var(--dim); }

  .pnl-pos { color: var(--green); }
  .pnl-neg { color: var(--red); }

  /* Insights panel */
  .insights-card {
    background: var(--surface);
    border: 1px solid var(--green);
    padding: 28px;
    animation: fadeUp 0.5s ease 0.7s both;
    position: relative;
  }
  .insights-card::before {
    content: '// INSIGHTS';
    position: absolute;
    top: -1px; right: 20px;
    background: var(--green);
    color: var(--bg);
    font-size: 10px;
    padding: 2px 10px;
    letter-spacing: 0.15em;
    font-weight: 700;
  }

  .insight-item {
    display: flex;
    gap: 16px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    line-height: 1.6;
  }
  .insight-item:last-child { border-bottom: none; padding-bottom: 0; }

  .insight-icon { color: var(--green); flex-shrink: 0; }

  /* No data state */
  .no-data {
    text-align: center;
    padding: 80px 20px;
    color: var(--dim);
  }
  .no-data-title {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    margin-bottom: 12px;
    color: var(--muted);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="logo">Options<span>CLI</span></div>
  <div class="header-right">
    <div class="sync-time" id="syncTime">Loading...</div>
    <button class="exit-btn" onclick="exitDashboard()">✕ EXIT</button>
  </div>
</header>

<main id="main">
  <div class="no-data">
    <div class="no-data-title">Loading trades...</div>
    <div style="color:var(--dim);font-size:13px">Connecting to database</div>
  </div>
</main>

<script>
async function exitDashboard() {
  try { await fetch('/exit', {method:'POST'}); } catch(e) {}
  window.close();
  document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:monospace;color:#3a3a5c;background:#0a0a0f;font-size:14px;">[ session closed — return to terminal ]</div>';
}

function fmt(n, dec=1) {
  if (n === null || n === undefined) return '—';
  return (n >= 0 ? '+' : '') + Number(n).toFixed(dec);
}

function fmtPct(n) {
  if (n === null || n === undefined) return '—';
  const v = Number(n).toFixed(1);
  return (n >= 0 ? '+' : '') + v + '%';
}

function statusBadge(s) {
  if (s === 'resolved_win')  return `<span class="badge badge-win">WIN</span>`;
  if (s === 'resolved_loss') return `<span class="badge badge-loss">LOSS</span>`;
  if (s === 'pending')       return `<span class="badge badge-pending">PENDING</span>`;
  return `<span class="badge badge-other">${s.toUpperCase()}</span>`;
}

function generateInsights(data, stats) {
  const insights = [];
  const resolved = data.filter(t => t.status === 'resolved_win' || t.status === 'resolved_loss');

  if (resolved.length === 0) {
    return [{ icon: '○', text: 'No resolved trades yet. Run sync after earnings to start building your track record.' }];
  }

  // Win rate insight
  const wr = stats.win_rate;
  if (wr >= 60) insights.push({ icon: '▲', text: `Strong win rate of ${wr.toFixed(0)}%. Your entry timing and ticker selection are working. Keep focusing on IV rank 50–70 entries.` });
  else if (wr >= 45) insights.push({ icon: '◈', text: `Win rate of ${wr.toFixed(0)}% is near breakeven. Review your worst losses — are they clustered around specific tickers or high IV rank entries?` });
  else insights.push({ icon: '▼', text: `Win rate of ${wr.toFixed(0)}% suggests IV is already fully priced at entry. Try tightening the IV rank filter to 40–65 or entering earlier (higher DTE).` });

  // Best ticker
  const byTicker = {};
  resolved.forEach(t => {
    if (!byTicker[t.ticker]) byTicker[t.ticker] = { wins: 0, total: 0 };
    byTicker[t.ticker].total++;
    if (t.status === 'resolved_win') byTicker[t.ticker].wins++;
  });
  const bestTicker = Object.entries(byTicker).filter(([,v]) => v.total >= 2).sort((a,b) => (b[1].wins/b[1].total) - (a[1].wins/a[1].total))[0];
  if (bestTicker) insights.push({ icon: '★', text: `${bestTicker[0]} is your best performer: ${bestTicker[1].wins}/${bestTicker[1].total} wins. Consider prioritizing it in future scans.` });

  // Worst ticker
  const worstTicker = Object.entries(byTicker).filter(([,v]) => v.total >= 2).sort((a,b) => (a[1].wins/a[1].total) - (b[1].wins/b[1].total))[0];
  if (worstTicker && worstTicker[0] !== (bestTicker && bestTicker[0])) {
    insights.push({ icon: '⚠', text: `${worstTicker[0]} is your worst performer: ${worstTicker[1].wins}/${worstTicker[1].total} wins. Consider removing it from your watchlist or avoiding earnings entries.` });
  }

  // Avg win vs loss
  if (stats.avg_win && stats.avg_loss) {
    const ratio = Math.abs(stats.avg_win / stats.avg_loss);
    if (ratio >= 1.5) insights.push({ icon: '◎', text: `Good risk/reward: avg win (${fmtPct(stats.avg_win)}) is ${ratio.toFixed(1)}x your avg loss (${fmtPct(stats.avg_loss)}). Positive expectancy even below 50% win rate.` });
    else insights.push({ icon: '◎', text: `Avg win (${fmtPct(stats.avg_win)}) vs avg loss (${fmtPct(stats.avg_loss)}) — ratio of ${ratio.toFixed(1)}x. You need >50% win rate to be profitable at this ratio.` });
  }

  // Strategy breakdown
  const byStrategy = {};
  resolved.forEach(t => {
    if (!byStrategy[t.strategy]) byStrategy[t.strategy] = { wins: 0, total: 0 };
    byStrategy[t.strategy].total++;
    if (t.status === 'resolved_win') byStrategy[t.strategy].wins++;
  });
  const strategies = Object.entries(byStrategy).filter(([,v]) => v.total >= 2);
  if (strategies.length >= 2) {
    const best = strategies.sort((a,b) => (b[1].wins/b[1].total) - (a[1].wins/a[1].total))[0];
    insights.push({ icon: '◆', text: `${best[0]} is your best strategy at ${(best[1].wins/best[1].total*100).toFixed(0)}% win rate. Focus your next scans here.` });
  }

  return insights.slice(0, 5);
}

async function loadData() {
  try {
    const res = await fetch('/data');
    const { trades, stats } = await res.json();

    document.getElementById('syncTime').textContent = `LAST UPDATED ${new Date().toLocaleTimeString()}`;

    if (!trades || trades.length === 0) {
      document.getElementById('main').innerHTML = `
        <div class="no-data">
          <div class="no-data-title">No trades yet</div>
          <div style="color:var(--dim);font-size:13px;margin-top:8px">Run <span style="color:var(--green)">findAll longStraddleEarnings</span> to start scanning</div>
        </div>`;
      return;
    }

    const resolved = trades.filter(t => t.status === 'resolved_win' || t.status === 'resolved_loss');
    const wins = trades.filter(t => t.status === 'resolved_win').length;
    const losses = trades.filter(t => t.status === 'resolved_loss').length;
    const pending = trades.filter(t => t.status === 'pending').length;
    const winRate = resolved.length > 0 ? (wins / resolved.length * 100) : 0;
    const statsObj = {
      win_rate: winRate,
      avg_win: stats.avg_win,
      avg_loss: stats.avg_loss,
      avg_pnl: stats.avg_pnl,
    };

    // ── KPIs ──────────────────────────────────────────────────────────────
    const kpiHtml = `
      <div class="kpi ${winRate >= 50 ? 'green' : 'red'}">
        <div class="kpi-label">Win Rate</div>
        <div class="kpi-value">${winRate.toFixed(0)}%</div>
        <div class="kpi-sub">${wins}W / ${losses}L resolved</div>
      </div>
      <div class="kpi ${stats.avg_pnl >= 0 ? 'green' : 'red'}">
        <div class="kpi-label">Avg P&L</div>
        <div class="kpi-value">${fmtPct(stats.avg_pnl)}</div>
        <div class="kpi-sub">per resolved trade</div>
      </div>
      <div class="kpi yellow">
        <div class="kpi-label">Avg Win</div>
        <div class="kpi-value">${fmtPct(stats.avg_win)}</div>
        <div class="kpi-sub">IV expansion on wins</div>
      </div>
      <div class="kpi red">
        <div class="kpi-label">Avg Loss</div>
        <div class="kpi-value">${fmtPct(stats.avg_loss)}</div>
        <div class="kpi-sub">IV compression on losses</div>
      </div>
      <div class="kpi blue">
        <div class="kpi-label">Pending</div>
        <div class="kpi-value">${pending}</div>
        <div class="kpi-sub">${trades.length} total trades</div>
      </div>`;

    // ── Cumulative P&L ────────────────────────────────────────────────────
    const sortedResolved = [...resolved].sort((a,b) => new Date(a.resolved_date||a.scan_date) - new Date(b.resolved_date||b.scan_date));
    let cumPnl = 0;
    const cumLabels = [];
    const cumData = [0];
    sortedResolved.forEach(t => {
      cumPnl += (t.pnl_estimate || 0);
      cumLabels.push(t.ticker);
      cumData.push(parseFloat(cumPnl.toFixed(2)));
    });
    cumLabels.unshift('start');

    // ── Win/Loss by ticker ────────────────────────────────────────────────
    const tickerMap = {};
    resolved.forEach(t => {
      if (!tickerMap[t.ticker]) tickerMap[t.ticker] = { wins: 0, losses: 0 };
      t.status === 'resolved_win' ? tickerMap[t.ticker].wins++ : tickerMap[t.ticker].losses++;
    });
    const tickerLabels = Object.keys(tickerMap);
    const tickerWins   = tickerLabels.map(k => tickerMap[k].wins);
    const tickerLosses = tickerLabels.map(k => tickerMap[k].losses);

    // ── IV rank distribution ──────────────────────────────────────────────
    const ivBuckets = {'0-30':0,'30-50':0,'50-65':0,'65-80':0,'80+':0};
    const ivBucketWins = {'0-30':0,'30-50':0,'50-65':0,'65-80':0,'80+':0};
    resolved.forEach(t => {
      const iv = t.iv_rank || 0;
      const key = iv < 30 ? '0-30' : iv < 50 ? '30-50' : iv < 65 ? '50-65' : iv < 80 ? '65-80' : '80+';
      ivBuckets[key]++;
      if (t.status === 'resolved_win') ivBucketWins[key]++;
    });

    // ── Strategy breakdown ────────────────────────────────────────────────
    const stratMap = {};
    trades.forEach(t => {
      if (!stratMap[t.strategy]) stratMap[t.strategy] = { wins: 0, losses: 0, pending: 0 };
      if (t.status === 'resolved_win')  stratMap[t.strategy].wins++;
      else if (t.status === 'resolved_loss') stratMap[t.strategy].losses++;
      else if (t.status === 'pending')  stratMap[t.strategy].pending++;
    });

    // ── HTML ──────────────────────────────────────────────────────────────
    document.getElementById('main').innerHTML = `
      <div class="kpi-row">${kpiHtml}</div>

      <div class="chart-grid">
        <div class="card">
          <div class="card-title">Cumulative P&L (IV expansion %)</div>
          <canvas id="cumulChart" height="220"></canvas>
        </div>
        <div class="card">
          <div class="card-title">Wins vs Losses by Ticker</div>
          <canvas id="tickerChart" height="220"></canvas>
        </div>
      </div>

      <div class="chart-row">
        <div class="card">
          <div class="card-title">Win Rate by IV Rank at Entry</div>
          <canvas id="ivChart" height="200"></canvas>
        </div>
        <div class="card">
          <div class="card-title">Strategy Breakdown</div>
          <canvas id="stratChart" height="200"></canvas>
        </div>
        <div class="card">
          <div class="card-title">P&L Distribution</div>
          <canvas id="distChart" height="200"></canvas>
        </div>
      </div>

      <div class="table-card">
        <div class="card-title">All Trades</div>
        <table>
          <thead>
            <tr>
              <th>Ticker</th><th>Strategy</th><th>Scan Date</th>
              <th>Event Date</th><th>IV Rank</th><th>Status</th><th>P&L Est.</th><th>Notes</th>
            </tr>
          </thead>
          <tbody>
            ${trades.map(t => `
              <tr>
                <td style="color:var(--text);font-weight:500">${t.ticker}</td>
                <td style="color:var(--dim);font-size:11px">${t.strategy}</td>
                <td style="color:var(--dim)">${t.scan_date}</td>
                <td style="color:var(--dim)">${t.earnings_date}</td>
                <td style="color:var(--yellow)">${t.iv_rank ? t.iv_rank.toFixed(0) : '—'}</td>
                <td>${statusBadge(t.status)}</td>
                <td class="${t.pnl_estimate >= 0 ? 'pnl-pos' : 'pnl-neg'}">${fmtPct(t.pnl_estimate)}</td>
                <td style="color:var(--dim);font-size:11px">${t.notes || '—'}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>

      <div class="insights-card">
        <div class="card-title">AI Insights</div>
        <div id="insightsList"></div>
      </div>
    `;

    // ── Charts ────────────────────────────────────────────────────────────
    const gridColor = 'rgba(30,30,46,0.8)';
    const tickColor = '#5a5a7a';
    const baseOpts = {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: gridColor }, ticks: { color: tickColor, font: { family: 'JetBrains Mono', size: 10 } } },
        y: { grid: { color: gridColor }, ticks: { color: tickColor, font: { family: 'JetBrains Mono', size: 10 } } },
      }
    };

    // Cumulative P&L
    new Chart(document.getElementById('cumulChart'), {
      type: 'line',
      data: {
        labels: cumLabels,
        datasets: [{
          data: cumData,
          borderColor: cumData[cumData.length-1] >= 0 ? '#00ff87' : '#ff3a5c',
          backgroundColor: cumData[cumData.length-1] >= 0 ? 'rgba(0,255,135,0.06)' : 'rgba(255,58,92,0.06)',
          fill: true,
          tension: 0.3,
          pointRadius: 4,
          pointBackgroundColor: cumData[cumData.length-1] >= 0 ? '#00ff87' : '#ff3a5c',
          borderWidth: 2,
        }]
      },
      options: { ...baseOpts, plugins: { legend: { display: false } } }
    });

    // Ticker wins/losses
    new Chart(document.getElementById('tickerChart'), {
      type: 'bar',
      data: {
        labels: tickerLabels,
        datasets: [
          { label: 'Wins',   data: tickerWins,   backgroundColor: 'rgba(0,255,135,0.7)', borderRadius: 2 },
          { label: 'Losses', data: tickerLosses, backgroundColor: 'rgba(255,58,92,0.7)',  borderRadius: 2 },
        ]
      },
      options: { ...baseOpts, plugins: { legend: { display: true, labels: { color: tickColor, font: { family: 'JetBrains Mono', size: 10 } } } } }
    });

    // IV rank win rate
    const ivKeys = Object.keys(ivBuckets);
    const ivWinRates = ivKeys.map(k => ivBuckets[k] > 0 ? (ivBucketWins[k]/ivBuckets[k]*100) : 0);
    new Chart(document.getElementById('ivChart'), {
      type: 'bar',
      data: {
        labels: ivKeys,
        datasets: [{
          data: ivWinRates,
          backgroundColor: ivWinRates.map(v => v >= 50 ? 'rgba(0,255,135,0.7)' : 'rgba(255,58,92,0.5)'),
          borderRadius: 2,
        }]
      },
      options: { ...baseOpts, scales: { ...baseOpts.scales, y: { ...baseOpts.scales.y, max: 100 } } }
    });

    // Strategy donut
    const stratLabels = Object.keys(stratMap);
    const stratWins   = stratLabels.map(k => stratMap[k].wins);
    const stratColors = ['rgba(0,255,135,0.8)','rgba(76,201,240,0.8)','rgba(255,209,102,0.8)','rgba(255,58,92,0.8)'];
    new Chart(document.getElementById('stratChart'), {
      type: 'doughnut',
      data: {
        labels: stratLabels,
        datasets: [{ data: stratLabels.map(k => stratMap[k].wins + stratMap[k].losses + stratMap[k].pending), backgroundColor: stratColors, borderWidth: 0 }]
      },
      options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: tickColor, font: { family: 'JetBrains Mono', size: 10 }, boxWidth: 10 } } } }
    });

    // P&L distribution histogram
    const pnls = resolved.filter(t => t.pnl_estimate !== null).map(t => t.pnl_estimate);
    const buckets = Array(10).fill(0);
    const min = Math.min(...pnls, -50), max = Math.max(...pnls, 50);
    const step = (max - min) / 10;
    pnls.forEach(p => { const i = Math.min(9, Math.floor((p - min) / step)); buckets[i]++; });
    const distLabels = buckets.map((_, i) => `${(min + i*step).toFixed(0)}%`);
    new Chart(document.getElementById('distChart'), {
      type: 'bar',
      data: {
        labels: distLabels,
        datasets: [{ data: buckets, backgroundColor: buckets.map((_, i) => (min + i*step) >= 0 ? 'rgba(0,255,135,0.6)' : 'rgba(255,58,92,0.5)'), borderRadius: 2 }]
      },
      options: baseOpts
    });

    // Insights
    const insights = generateInsights(trades, statsObj);
    document.getElementById('insightsList').innerHTML = insights.map(ins => `
      <div class="insight-item">
        <span class="insight-icon">${ins.icon}</span>
        <span>${ins.text}</span>
      </div>`).join('');

  } catch(e) {
    console.error(e);
    document.getElementById('main').innerHTML = `<div class="no-data"><div class="no-data-title">Error loading data</div><div style="color:var(--dim)">${e.message}</div></div>`;
  }
}

loadData();
</script>
</body>
</html>
